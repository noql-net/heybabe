name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true
        
    - name: Build binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        # Build variables
        VERSION=${{ github.ref_name }}
        if [[ ! "${{ github.ref }}" =~ ^refs/tags/ ]]; then
          VERSION=${{ github.sha }}
        fi
        
        # Build binary
        mkdir -p dist
        BINARY="heybabe-${{ matrix.goos }}-${{ matrix.goarch }}"
        [ "${{ matrix.goos }}" = "windows" ] && BINARY="${BINARY}.exe"
        
        go build -ldflags="-s -w -X main.version=${VERSION}" -o "dist/${BINARY}" .
        
        # Make binary executable
        chmod +x "dist/${BINARY}"
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: heybabe-${{ matrix.goos }}-${{ matrix.goarch }}
        path: dist/
        retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist/
        pattern: heybabe-*
        merge-multiple: true
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        generate_release_notes: true

